<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>전문가 Q&A | 박배선 법무사 사무소</title>
  <meta name="description" content="법무사가 직접 답변하는 부동산, 법인, 소송, 상속 관련 자주 묻는 질문 모음입니다." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body id="blogPage">

  <!-- Navbar -->
  <div id="navHolder" data-page="blog"></div>

  <!-- ========== HERO ========== -->
  <section class="blog-hero">
    <div class="container">
      <div class="badge" style="background:rgba(201,168,76,0.3);color:var(--secondary-light);border:1px solid rgba(201,168,76,0.4);">전문가 Q&A</div>
      <h1>법무사가 직접 답변합니다</h1>
      <p>고객들이 가장 많이 묻는 법률 질문에 전문 법무사가 정확한 답변을 드립니다.<br>
        원하는 답변을 찾지 못하셨다면 직접 상담을 신청해 주세요.</p>
      <div style="margin-top:24px;">
        <button class="btn-white" onclick="openModal()">📞 직접 상담 신청하기</button>
      </div>
    </div>
  </section>

  <!-- ========== FILTER TABS ========== -->
  <div class="blog-filters">
    <div class="container">
      <div class="filter-tabs" id="blogFilters">
        <!-- JS로 렌더링 -->
      </div>
    </div>
  </div>

  <!-- ========== BLOG GRID ========== -->
  <section class="blog-content">
    <div class="container">
      <div class="blog-grid" id="blogGrid">
        <!-- JS로 렌더링 -->
      </div>
    </div>
  </section>

  <!-- ========== CTA SECTION ========== -->
  <section class="cta-banner">
    <div class="container">
      <h2>원하는 답변을 찾지 못하셨나요?</h2>
      <p>고객 맞춤형 법무 상담을 신청하시면 법무사가 직접 답변드립니다.</p>
      <div class="cta-btns">
        <button class="btn-white" onclick="openModal()">📞 상담 신청</button>
        <a href="content.html" class="btn-outline" style="color:#fff;border-color:rgba(255,255,255,0.5);">업무 안내 보기</a>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <div id="footHolder"></div>
  <!-- Modal -->
  <div id="modalHolder"></div>

  <script src="js/main.js?v=4"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>직원 로그인 - 박배선법무사 사무소</title>
  <link rel="stylesheet" href="../css/admin.css" />
</head>
<body>

  <div class="login-page">
    <div class="login-card">
      <!-- 로고 -->
      <div class="login-logo">
        <div class="logo-icon">⚖</div>
        <div class="logo-text">박배선법무사 사무소</div>
      </div>
      <div class="login-subtitle">직원 내부 포털</div>

      <!-- 로그인 폼 -->
      <form class="login-form" id="loginForm" autocomplete="off">
        <div class="form-group">
          <label for="loginId">아이디</label>
          <input type="text" id="loginId" placeholder="아이디를 입력하세요" autofocus />
        </div>
        <div class="form-group">
          <label for="loginPw">비밀번호</label>
          <input type="password" id="loginPw" placeholder="비밀번호를 입력하세요" />
        </div>
        <button type="submit" class="login-btn">로그인</button>
        <div class="login-error" id="loginError"></div>
      </form>
    </div>
  </div>

  <script src="../js/admin.js"></script>
  <script>
    // 이미 로그인된 경우 portal로 이동
    const session = localStorage.getItem('bslaw_admin_session');
    if (session) {
      window.location.href = 'portal.html';
    } else {
      initLoginPage();
    }
  </script>
</body>
</html>
